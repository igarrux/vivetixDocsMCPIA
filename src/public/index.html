<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vivetix Chat</title>
  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Highlight.js for code syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.11.1/build/highlight.min.js"></script>
  <style>
    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --surface-hover: #222228;
      --border: #2a2a32;
      --text: #e4e4e7;
      --text-muted: #8b8b96;
      --accent: #6d5dfc;
      --accent-light: #8b7dff;
      --user-bg: #6d5dfc;
      --user-text: #fff;
      --bot-bg: #1e1e24;
      --success: #34d399;
      --danger: #f87171;
      --radius: 12px;
      --radius-lg: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ───────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 18px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }

    .status-dot.offline { background: var(--danger); }

    #resetBtn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    #resetBtn:hover {
      background: var(--surface-hover);
      color: var(--text);
      border-color: var(--text-muted);
    }

    /* ── Messages area ────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .welcome {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
    }

    .welcome h2 {
      font-size: 24px;
      color: var(--text);
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .suggestion-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion-chip:hover {
      background: var(--surface-hover);
      color: var(--text);
      border-color: var(--accent);
    }

    /* ── Message bubbles ──────────────────────────────────── */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 80%;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.bot .msg-avatar {
      background: var(--accent);
      color: white;
    }

    .msg.user .msg-avatar {
      background: #3b3b44;
      color: var(--text);
    }

    .msg-bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 14px;
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .msg.bot .msg-bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* ── Markdown styling inside bot messages ─────────────── */
    .msg.bot .msg-bubble h1,
    .msg.bot .msg-bubble h2,
    .msg.bot .msg-bubble h3,
    .msg.bot .msg-bubble h4 {
      margin: 12px 0 6px;
      color: var(--text);
    }

    .msg.bot .msg-bubble h1 { font-size: 18px; }
    .msg.bot .msg-bubble h2 { font-size: 16px; }
    .msg.bot .msg-bubble h3 { font-size: 15px; }

    .msg.bot .msg-bubble p {
      margin: 6px 0;
    }

    .msg.bot .msg-bubble ul,
    .msg.bot .msg-bubble ol {
      margin: 6px 0;
      padding-left: 20px;
    }

    .msg.bot .msg-bubble li {
      margin: 3px 0;
    }

    .msg.bot .msg-bubble code {
      background: #2a2a34;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 13px;
    }

    .msg.bot .msg-bubble pre {
      background: #16161a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin: 8px 0;
      overflow-x: auto;
    }

    .msg.bot .msg-bubble pre code {
      background: none;
      padding: 0;
      font-size: 13px;
    }

    .msg.bot .msg-bubble a {
      color: var(--accent-light);
      text-decoration: none;
    }

    .msg.bot .msg-bubble a:hover {
      text-decoration: underline;
    }

    .msg.bot .msg-bubble blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      margin: 8px 0;
      color: var(--text-muted);
    }

    .msg.bot .msg-bubble table {
      border-collapse: collapse;
      margin: 8px 0;
      width: 100%;
    }

    .msg.bot .msg-bubble th,
    .msg.bot .msg-bubble td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
      font-size: 13px;
    }

    .msg.bot .msg-bubble th {
      background: #222228;
    }

    /* ── Typing indicator ─────────────────────────────────── */
    .typing {
      display: flex;
      gap: 4px;
      padding: 16px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.4s ease-in-out infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* ── Input area ───────────────────────────────────────── */
    .input-area {
      padding: 16px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
      max-width: 860px;
      margin: 0 auto;
    }

    #userInput {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      transition: border-color 0.2s;
    }

    #userInput:focus {
      border-color: var(--accent);
    }

    #userInput::placeholder {
      color: var(--text-muted);
    }

    #sendBtn {
      background: var(--accent);
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    #sendBtn:hover {
      background: var(--accent-light);
    }

    #sendBtn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #sendBtn svg {
      width: 20px;
      height: 20px;
    }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ── Responsive ───────────────────────────────────────── */
    @media (max-width: 640px) {
      .msg { max-width: 92%; }
      .suggestions { flex-direction: column; align-items: center; }
      header { padding: 10px 14px; }
      #messages { padding: 16px 12px; }
      .input-area { padding: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">🎟</div>
      <span>Vivetix Chat</span>
    </div>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Conectado</span>
    </div>
    <button id="resetBtn" title="Nueva conversación">🔄 Nueva conversación</button>
  </header>

  <div id="messages">
    <div class="welcome">
      <h2>👋 ¡Hola! Soy el asistente de Vivetix</h2>
      <p>Pregúntame lo que quieras sobre la plataforma: eventos, entradas, precios, términos legales, atención al cliente y más.</p>
      <div class="suggestions">
        <button class="suggestion-chip" data-msg="¿Qué es Vivetix?">¿Qué es Vivetix?</button>
        <button class="suggestion-chip" data-msg="¿Cómo creo un evento?">¿Cómo creo un evento?</button>
        <button class="suggestion-chip" data-msg="¿Cuánto cuesta usar Vivetix?">¿Cuánto cuesta?</button>
        <button class="suggestion-chip" data-msg="¿Cómo retiro mi dinero?">¿Cómo retiro mi dinero?</button>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="userInput"
        placeholder="Escribe tu pregunta…"
        rows="1"
        autofocus
      ></textarea>
      <button id="sendBtn" title="Enviar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter para enviar · Shift+Enter para salto de línea</div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const inputEl    = document.getElementById("userInput");
    const sendBtn    = document.getElementById("sendBtn");
    const resetBtn   = document.getElementById("resetBtn");
    const statusDot  = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");

    let sending = false;

    // ── Configure marked ────────────────────────────────────
    marked.setOptions({
      highlight: (code, lang) => {
        if (lang && hljs.getLanguage(lang)) {
          return hljs.highlight(code, { language: lang }).value;
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true,
    });

    // ── Auto-resize textarea ────────────────────────────────
    inputEl.addEventListener("input", () => {
      inputEl.style.height = "auto";
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
    });

    // ── Send on Enter ───────────────────────────────────────
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    sendBtn.addEventListener("click", sendMessage);

    // ── Suggestion chips ────────────────────────────────────
    document.querySelectorAll(".suggestion-chip").forEach((chip) => {
      chip.addEventListener("click", () => {
        inputEl.value = chip.dataset.msg;
        sendMessage();
      });
    });

    // ── Reset ───────────────────────────────────────────────
    resetBtn.addEventListener("click", async () => {
      await fetch("/api/reset", { method: "POST" });
      messagesEl.innerHTML = "";
      addWelcome();
    });

    // ── Send message ────────────────────────────────────────
    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || sending) return;

      // Remove welcome screen
      const welcome = messagesEl.querySelector(".welcome");
      if (welcome) welcome.remove();

      addMessage(text, "user");
      inputEl.value = "";
      inputEl.style.height = "auto";

      sending = true;
      sendBtn.disabled = true;
      const typingEl = addTyping();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });

        const data = await res.json();

        typingEl.remove();

        if (data.error) {
          addMessage("⚠️ Error: " + data.error, "bot");
        } else {
          addMessage(data.reply, "bot", true);
        }
      } catch (err) {
        typingEl.remove();
        addMessage("⚠️ No se pudo conectar con el servidor.", "bot");
        statusDot.classList.add("offline");
        statusText.textContent = "Desconectado";
      } finally {
        sending = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    // ── Add message bubble ──────────────────────────────────
    function addMessage(content, role, isMarkdown = false) {
      const msg = document.createElement("div");
      msg.className = `msg ${role}`;

      const avatar = document.createElement("div");
      avatar.className = "msg-avatar";
      avatar.textContent = role === "bot" ? "🤖" : "👤";

      const bubble = document.createElement("div");
      bubble.className = "msg-bubble";

      if (isMarkdown) {
        bubble.innerHTML = marked.parse(content);
        // Highlight code blocks that marked didn't catch
        bubble.querySelectorAll("pre code").forEach((block) => {
          hljs.highlightElement(block);
        });
      } else {
        bubble.textContent = content;
      }

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      scrollToBottom();
    }

    // ── Typing indicator ────────────────────────────────────
    function addTyping() {
      const msg = document.createElement("div");
      msg.className = "msg bot";

      const avatar = document.createElement("div");
      avatar.className = "msg-avatar";
      avatar.textContent = "🤖";

      const bubble = document.createElement("div");
      bubble.className = "msg-bubble";
      bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';

      msg.appendChild(avatar);
      msg.appendChild(bubble);
      messagesEl.appendChild(msg);
      scrollToBottom();
      return msg;
    }

    // ── Welcome screen ──────────────────────────────────────
    function addWelcome() {
      messagesEl.innerHTML = `
        <div class="welcome">
          <h2>👋 ¡Hola! Soy el asistente de Vivetix</h2>
          <p>Pregúntame lo que quieras sobre la plataforma: eventos, entradas, precios, términos legales, atención al cliente y más.</p>
          <div class="suggestions">
            <button class="suggestion-chip" data-msg="¿Qué es Vivetix?">¿Qué es Vivetix?</button>
            <button class="suggestion-chip" data-msg="¿Cómo creo un evento?">¿Cómo creo un evento?</button>
            <button class="suggestion-chip" data-msg="¿Cuánto cuesta usar Vivetix?">¿Cuánto cuesta?</button>
            <button class="suggestion-chip" data-msg="¿Cómo retiro mi dinero?">¿Cómo retiro mi dinero?</button>
          </div>
        </div>`;
      document.querySelectorAll(".suggestion-chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          inputEl.value = chip.dataset.msg;
          sendMessage();
        });
      });
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  </script>
</body>
</html>
